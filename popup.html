<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }
    .header {
      background: linear-gradient(135deg, #0f3460, #16213e);
      padding: 16px;
      text-align: center;
    }
    .header h1 {
      font-size: 16px;
      color: #fff;
      margin-bottom: 4px;
      letter-spacing: 0.3px;
    }
    .header p {
      font-size: 11px;
      color: #8888aa;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 14px;
      background: rgba(0,0,0,0.2);
    }
    .stat {
      text-align: center;
    }
    .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }
    .stat-label {
      font-size: 10px;
      color: #8888aa;
      text-transform: uppercase;
    }
    .stat-number.green { color: #4caf50; }
    .info {
      padding: 14px;
      text-align: center;
      color: #8888aa;
      font-size: 12px;
      line-height: 1.5;
    }
    .info strong { color: #b0b0d0; }
    .actions {
      padding: 10px 14px 14px;
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-toggle {
      background: #0f3460;
      color: #fff;
    }
    .btn-toggle:hover { background: #1a4f8e; }
    .privacy {
      padding: 10px 14px 14px;
      text-align: center;
      font-size: 10px;
      color: #4a4a6a;
      line-height: 1.4;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .privacy strong { color: #27ae60; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Wer trackt wen warum wozu</h1>
    <p>Dein Blick hinter die Kulissen</p>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-number" id="tracker-count">-</div>
      <div class="stat-label">Tracker</div>
    </div>
    <div class="stat">
      <div class="stat-number" id="request-count">-</div>
      <div class="stat-label">Anfragen</div>
    </div>
    <div class="stat">
      <div class="stat-number green" id="blocked-count">-</div>
      <div class="stat-label">Gesch&uuml;tzt</div>
    </div>
  </div>
  <div class="info">
    Am rechten Seitenrand siehst du den <strong>Tracker</strong>-Tab &mdash; dort findest du alle Details.
  </div>
  <div class="actions">
    <button class="btn btn-toggle" id="toggle-sidebar">&Uuml;bersicht &ouml;ffnen</button>
  </div>
  <div class="privacy">
    <strong>Arbeitet vollst&auml;ndig lokal</strong><br>
    Keine Daten verlassen deinen Browser. Alles bleibt bei dir.
  </div>
  <script src="popup.js"></script>
</body>
</html>
